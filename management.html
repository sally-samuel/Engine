  <script src="sanity-config/config.js"></script>
  <script>
    function urlForSanityImage(ref, opts = "") {
      if (!ref) return null;
      // ref looks like: image-<assetId>-<width>x<height>-<format>
      const parts = ref.split("-");
      const format = parts.pop(); // e.g. "jpg"
      const dimensions = parts.pop(); // e.g. "1200x1600"
      const assetId = parts.slice(1).join("-"); // drop leading "image"
      return `https://cdn.sanity.io/images/wrtxyfej/production/${assetId}-${dimensions}.${format}${opts}`;
    }

    const PLACEHOLDER_ICON = `
        <div class="person-photo-placeholder" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="#174caa" stroke-width="1.5" />
            <path d="M4 20c0-4.418 3.582-7 8-7s8 2.582 8 7" stroke="#174caa" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </div>`;

    async function fetchManagementData() {
      try {
        const query = `*[_type == "management"] | order(displayOrder asc)`;
        const encodedQuery = encodeURIComponent(query);
        const url = `https://${SANITY_CONFIG.projectId}.apicdn.sanity.io/v2025-06-01/data/query/production?query=${encodedQuery}`;

        console.log("Fetching from:", url);
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to fetch: ${res.status}`);

        const json = await res.json();
        const result = json.result || [];

        console.log("Sanity response:", json);

        const grid = document.querySelector(".kp-grid");
        grid.innerHTML = "";

        if (result.length === 0) {
          console.warn("No management records found in Sanity");
          return;
        }

        result.forEach((person) => {
          const slug =
            person.slug && person.slug.current ? person.slug.current : "";

          let photoUrl = null;
          if (person.image && person.image.asset && person.image.asset._ref) {
            photoUrl = urlForSanityImage(
              person.image.asset._ref,
              "?w=400&h=500&fit=crop",
            );
          }

          const name = person.name || "Unknown";
          const role = person.position || "";

          const card = document.createElement(slug ? "a" : "div");
          card.className = "person-card";
          if (slug) {
            card.href = `team-member.html?slug=${encodeURIComponent(slug)}`;
          }
          card.setAttribute("aria-label", `View ${name}'s profile`);
          card.innerHTML = `
              ${photoUrl
              ? `<img src="${photoUrl}" alt="${name}" loading="lazy" />`
              : PLACEHOLDER_ICON
            }
              <div class="person-info">
                <div class="person-name">${name}</div>
                <div class="person-role">${role}</div>
              </div>
            `;
          grid.appendChild(card);
        });

        console.log("Management data loaded successfully");
      } catch (error) {
        console.error("Error fetching management data:", error);
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", fetchManagementData);
    } else {
      fetchManagementData();
    }
  </script>
